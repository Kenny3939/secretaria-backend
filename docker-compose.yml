services:
  postgres:
    image: postgres:16-alpine
    container_name: secretaria_postgres
    environment:
      POSTGRES_DB: secretaria
      POSTGRES_USER: secretaria
      POSTGRES_PASSWORD: secretaria
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secretaria -d secretaria"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:

